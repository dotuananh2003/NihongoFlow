<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NihongoFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; z-index: 9999; background: white; padding: 20px;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var el = document.getElementById('error-log');
        if (el) {
          el.innerHTML += '<p>' + msg + ' <br> ' + (error ? error.stack : '') + '</p>';
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var el = document.getElementById('error-log');
        if (el) {
          el.innerHTML += '<p>Promise Rejection: ' + event.reason + '</p>';
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
